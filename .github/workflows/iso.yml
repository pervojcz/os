name: ISO
on:
  workflow_dispatch:

env:
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

jobs:
  variants:
    name: Prepare list of variants
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      variants: ${{ steps.json.outputs.variants }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Load variants
        id: json
        run: |
          output=$(bun script/list-variants.ts)
          echo "variants=$output" >> $GITHUB_OUTPUT

  generate-iso:
    name: Generate an ISO image
    runs-on: blacksmith-4vcpu-ubuntu-2404

    permissions:
      contents: read
      packages: read

    needs: variants
    strategy:
      matrix:
        variant: ${{ fromJson(needs.variants.outputs.variants) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v9

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Normalize image refs
        id: refs
        run: |
          set -euo pipefail
          image_name="${IMAGE_NAME,,}"
          image_registry="${IMAGE_REGISTRY,,}"
          image_full_name="${image_name}-${{ matrix.variant }}"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_registry=$image_registry" >> "$GITHUB_OUTPUT"
          echo "image_full_name=$image_full_name" >> "$GITHUB_OUTPUT"

      - name: Generate tag
        id: generate-tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
              tag="${{ github.ref_name }}"
          else
              tag="latest"
          fi

          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Get base image
        id: base-image
        run: |
          output=$(bun script/get-base-image.ts ${{ matrix.variant }})
          name=$(echo $output | jq -r ".name")
          version=$(echo $output | jq -r ".version")
          variant=$(echo $output | jq -r ".variant")

          echo "name=$name" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "variant=$variant" >> $GITHUB_OUTPUT

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.6.3

      - name: Verify image signature
        run: |
          set -euo pipefail
          cosign verify --key cosign.pub \
            "${{ steps.refs.outputs.image_registry }}/${{ steps.refs.outputs.image_full_name }}:${{ steps.generate-tag.outputs.tag }}"

      - name: Prefetch image for installer
        id: prefetch
        run: |
          set -euo pipefail
          ref="${{ steps.refs.outputs.image_registry }}/${{ steps.refs.outputs.image_full_name }}:${{ steps.generate-tag.outputs.tag }}"
          docker pull "$ref"
          docker save -o "${GITHUB_WORKSPACE}/iso-image.tar" "$ref"
          echo "image_src=docker-archive:/github/workspace/iso-image.tar" >> "$GITHUB_OUTPUT"

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: iso-build
        with:
          image_name: "${{ steps.refs.outputs.image_full_name }}"
          image_repo: "${{ steps.refs.outputs.image_registry }}"
          image_tag: "${{ steps.generate-tag.outputs.tag }}"
          image_src: "${{ steps.prefetch.outputs.image_src }}"
          image_signed: "true"
          variant: "${{ steps.base-image.outputs.variant }}"
          version: "${{ steps.base-image.outputs.version }}"
          iso_name: "${{ steps.refs.outputs.image_full_name }}-${{ steps.generate-tag.outputs.tag }}-${{ steps.base-image.outputs.version }}.iso"

      - name: Upload ISO to R2
        run: |
          bun script/upload-file.ts ${{ steps.iso-build.outputs.iso_path }}/${{ steps.iso-build.outputs.iso_name }}
          bun script/upload-file.ts ${{ steps.iso-build.outputs.iso_path }}/${{ steps.iso-build.outputs.iso_name }}-CHECKSUM
        env:
          R2_ENDPOINT: "${{ secrets.R2_ENDPOINT }}"
          R2_PUBLIC_URL: "${{ secrets.R2_PUBLIC_URL }}"
          R2_ACCESS_KEY_ID: "${{ secrets.R2_ACCESS_KEY_ID }}"
          R2_SECRET_ACCESS_KEY: "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          R2_BUCKET: "${{ secrets.R2_BUCKET }}"

      - name: Upload ISO as artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: "${{ steps.iso-build.outputs.iso_name }}"
          path: |
            ${{ steps.iso-build.outputs.iso_path }}/${{ steps.iso-build.outputs.iso_name }}
            ${{ steps.iso-build.outputs.iso_path }}/${{ steps.iso-build.outputs.iso_name }}-CHECKSUM
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
