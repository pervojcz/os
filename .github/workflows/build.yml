name: Build
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "05 10 * * *" # 10:05am UTC everyday
  push:
    branches:
      - main
    tags:
      - "*"
    paths-ignore:
      - "**/README.md"
  workflow_dispatch:

env:
  IMAGE_DESC: "Personal OS image based on Fedora Silverblue"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  GH_REPO: "${{ github.repository }}"
  GH_REF_TYPE: "${{ github.ref_type }}"
  GH_REF_NAME: "${{ github.ref_name }}"
  GH_PR: "${{ github.event.number }}"

jobs:
  variants:
    name: Prepare list of variants
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      variants: ${{ steps.json.outputs.variants }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Load variants
        id: json
        run: |
          output=$(bun script/list-variants.ts)
          echo "variants=$output" >> $GITHUB_OUTPUT

  build_push:
    name: Build and push image
    runs-on: blacksmith-4vcpu-ubuntu-2404

    permissions:
      contents: read
      packages: write
      id-token: write

    needs: variants
    strategy:
      matrix:
        variant: ${{ fromJson(needs.variants.outputs.variants) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Generate Containerfile
        id: generate
        run: |
          output=$(bun script/generate-containerfile.ts ${{ matrix.variant }})
          containerfile=$(echo "$output" | jq -r '.containerfile')
          echo "containerfile=$containerfile" >> $GITHUB_OUTPUT

          tags=$(echo "$output" | jq -r '.tags | join("\n")')
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          labels=$(echo "$output" | jq -r '.labels | join("\n")')
          {
            echo "labels<<EOF"
            echo "$labels"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Set up Docker Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ${{ steps.generate.outputs.containerfile }}
          push: true
          tags: ${{ steps.generate.outputs.tags }}
          labels: ${{ steps.generate.outputs.labels }}
